<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="500" height="268" viewBox="0 0 500 268">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#141b2d"/>
    </linearGradient>
    <!-- Top accent bar gradient (ShanuFx brand) -->
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7aa2f7"/>
      <stop offset="50%"  stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <!-- Clip paths (always defined even if not used) -->
    <clipPath id="avatarClip"><circle cx="52" cy="52" r="32"/></clipPath>
    <clipPath id="largeClip"><rect x="24" y="138" width="64" height="64" rx="10"/></clipPath>
    <clipPath id="smallClip"><circle cx="82" cy="196" r="9"/></clipPath>
  </defs>

  <!-- Card background + border -->
  <rect width="500" height="268" rx="16" fill="url(#bgGrad)" stroke="#1e2640" stroke-width="1.5"/>
  <!-- Top gradient accent bar -->
  <rect width="500" height="3" rx="1.5" fill="url(#topBar)"/>

  <!-- Avatar ring -->
  <circle cx="52" cy="52" r="35" fill="#1a2240" stroke="#262f52" stroke-width="1"/>
  <image href="data:image/png;base64," x="20" y="20" width="64" height="64" clip-path="url(#avatarClip)"/>

  <!-- Status dot (white ring mask + colored dot) -->
  <circle cx="76" cy="76" r="10" fill="#0d1117"/>
  <circle cx="76" cy="76" r="8"  fill="#57F287"/>

  <!-- Username -->
  <text x="96" y="46" font-family="'Segoe UI',Arial,sans-serif" font-size="17"
        font-weight="700" fill="#e0e6ff">shanudatirosh</text>

  <!-- Status pill -->
  <rect x="96" y="52" width="80" height="19" rx="9.5" fill="#57F287" fill-opacity="0.13"/>
  <circle cx="107" cy="61.5" r="4" fill="#57F287"/>
  <text x="116" y="66" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5"
        font-weight="700" fill="#57F287">ONLINE</text>

  <!-- Custom status (type 4) -->
  <text x="96" y="89" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#5c6a99"
            dominant-baseline="middle">New update coming soon! Stay tuned.</text>

  <!-- Activity block -->
  
  <!-- ─ Divider ─ -->
  <line x1="20" y1="110" x2="480" y2="110" stroke="#1a2345" stroke-width="1"/>
  <!-- Activity type label -->
  <text x="24" y="129" font-family="'Segoe UI',Arial,sans-serif" font-size="10"
        font-weight="700" letter-spacing="1.5" fill="#7aa2f7">PLAYING</text>
  <!-- App icon (large) -->
  <rect x="24" y="138" width="64" height="64" rx="10" fill="#1e2640"/>
         <text x="56" y="178" font-family="'Segoe UI',Arial,sans-serif" font-size="26"
               fill="#7aa2f7" text-anchor="middle">S</text>
  <!-- Badge icon (small) -->
  
  <!-- Text -->
  <text x="100" y="156" font-family="'Segoe UI',Arial,sans-serif" font-size="14"
             font-weight="700" fill="#e0e6ff">Shanu Fx Management</text>
  <text x="100" y="176" font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#8892b0">[TS]  api.ts</text>
  <text x="100" y="193" font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#8892b0">Powered by Shanu Fx</text>
  <text x="100" y="211" font-family="'Segoe UI',Arial,sans-serif" font-size="11"   fill="#4a5a80">18:12:52 elapsed</text>

  <!-- Footer brand watermark -->
  <text x="250" y="259" font-family="'Segoe UI',Arial,sans-serif" font-size="9"
        fill="#252f50" text-anchor="middle">ShanuFx · Powered by Lanyard</text>
</svg>